<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FATRAT — Plan Wizard Mockup</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root{
  --color-bg:10 10 10;--color-bg-card:32 32 34;--color-bg-elev:46 46 50;--color-bg-input:18 18 20;
  --color-ink:245 245 245;--color-ink-dim:160 160 165;--color-ink-mute:115 115 120;--color-ink-line:58 58 64;
  --color-accent:229 62 62;--color-accent-hot:255 91 61;--color-accent-dim:122 31 31;
  --color-ok:34 197 94;--color-warn:245 158 11;--color-info:59 130 246;--color-danger:239 68 68;
  --font-sans:'Onest',ui-sans-serif,system-ui,sans-serif;--font-mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:rgb(var(--color-bg));color:rgb(var(--color-ink));font-family:var(--font-sans);
  -webkit-font-smoothing:antialiased;letter-spacing:-0.012em;line-height:1.45}
.app{max-width:720px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:rgb(var(--color-bg)/0.92);backdrop-filter:blur(8px);
  border-bottom:1px solid rgb(var(--color-ink-line));padding:14px 18px 12px}
.topbar-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:0.02em}
.brand .dot{width:10px;height:10px;border-radius:3px;background:rgb(var(--color-accent))}
.steplabel{font-size:12px;color:rgb(var(--color-ink-dim));font-family:var(--font-mono)}
.progress{height:4px;border-radius:99px;background:rgb(var(--color-ink-line));margin-top:12px;overflow:hidden}
.progress > i{display:block;height:100%;background:rgb(var(--color-accent));transition:width .35s ease;border-radius:99px}
.stepdots{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.stepdots button{width:22px;height:22px;border-radius:6px;border:1px solid rgb(var(--color-ink-line));
  background:rgb(var(--color-bg-card));color:rgb(var(--color-ink-mute));font-size:10px;font-family:var(--font-mono);cursor:pointer}
.stepdots button.done{color:rgb(var(--color-ink));border-color:rgb(var(--color-accent-dim))}
.stepdots button.cur{background:rgb(var(--color-accent));color:#fff;border-color:rgb(var(--color-accent))}
.page{flex:1;padding:22px 18px 140px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.eyebrow{font-weight:600;text-transform:uppercase;letter-spacing:0.1em;font-size:11px;color:rgb(var(--color-accent))}
h1.pt{font-size:24px;font-weight:700;margin:6px 0 4px;letter-spacing:-0.02em}
.sub{color:rgb(var(--color-ink-dim));font-size:14px;margin-bottom:18px}
.section-head{font-weight:600;text-transform:uppercase;letter-spacing:0.08em;font-size:11px;color:rgb(var(--color-ink-dim));margin:22px 0 10px}
.section-head:first-of-type{margin-top:4px}
.grid{display:grid;gap:10px}
.grid.two{grid-template-columns:1fr 1fr}
.choice{background:rgb(var(--color-bg-card));border:1px solid rgb(var(--color-ink-line));border-radius:14px;
  padding:14px 16px;cursor:pointer;transition:border-color .12s,background .12s,transform .08s;position:relative;text-align:left;width:100%;color:inherit;font-family:inherit}
.choice:hover{border-color:rgb(var(--color-ink-mute))}
.choice:active{transform:scale(.99)}
.choice.sel{border-color:rgb(var(--color-accent))!important;background:rgb(var(--color-accent)/0.10)!important}
.choice.disabled{opacity:.38;pointer-events:none}
.choice .lbl{font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.choice .desc{color:rgb(var(--color-ink-dim));font-size:13px;margin-top:3px}
.choice .check{position:absolute;top:12px;right:12px;width:20px;height:20px;border-radius:50%;border:2px solid rgb(var(--color-ink-line));display:flex;align-items:center;justify-content:center;font-size:12px}
.choice.sel .check{background:rgb(var(--color-accent));border-color:rgb(var(--color-accent));color:#fff}
.choice.multi .check{border-radius:6px}
.badge{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 7px;border-radius:6px}
.badge.fit{background:rgb(var(--color-ok)/0.16);color:rgb(var(--color-ok))}
.badge.rec{background:rgb(var(--color-accent)/0.16);color:rgb(var(--color-accent-hot))}
.badge.lvl{background:rgb(var(--color-info)/0.16);color:rgb(var(--color-info))}
.badge.lock{background:rgb(var(--color-warn)/0.16);color:rgb(var(--color-warn))}
.whyfit{font-size:12px;color:rgb(var(--color-ok));margin-top:6px;display:flex;gap:6px;align-items:flex-start}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 13px;border-radius:99px;border:1px solid rgb(var(--color-ink-line));background:rgb(var(--color-bg-card));
  font-size:13px;font-weight:500;cursor:pointer;color:inherit;font-family:inherit}
.chip.sel{border-color:rgb(var(--color-accent));background:rgb(var(--color-accent)/0.12);color:rgb(var(--color-ink))}
.chip:disabled{opacity:.35;pointer-events:none}
.note{display:flex;gap:10px;padding:12px 14px;border-radius:12px;font-size:13px;margin:12px 0;line-height:1.45}
.note .ic{flex:none;font-size:15px}
.note.info{background:rgb(var(--color-info)/0.10);border:1px solid rgb(var(--color-info)/0.3);color:rgb(var(--color-ink))}
.note.warn{background:rgb(var(--color-warn)/0.10);border:1px solid rgb(var(--color-warn)/0.35);color:rgb(var(--color-ink))}
.note.ok{background:rgb(var(--color-ok)/0.10);border:1px solid rgb(var(--color-ok)/0.3);color:rgb(var(--color-ink))}
.field{margin-bottom:16px}
.field > label{display:block;font-size:13px;font-weight:600;margin-bottom:7px}
.field .hint{font-size:12px;color:rgb(var(--color-ink-mute));font-weight:400;margin-top:2px}
.inp{width:100%;background:rgb(var(--color-bg-input));border:1px solid rgb(var(--color-ink-line));border-radius:10px;
  padding:11px 13px;color:rgb(var(--color-ink));font-size:15px;font-family:var(--font-mono)}
.inp.txt{font-family:var(--font-sans)}
.inp:focus{outline:none;border-color:rgb(var(--color-accent))}
.row-inline{display:flex;gap:10px;align-items:center}
.card{background:rgb(var(--color-bg-card));border:1px solid rgb(var(--color-ink-line));border-radius:14px;padding:13px 15px;margin-bottom:12px}
.profcard{display:flex;flex-wrap:wrap;gap:6px 18px;font-size:14px}
.profcard .pk{color:rgb(var(--color-ink-mute));font-size:11px;text-transform:uppercase;letter-spacing:.05em;display:block}
/* prioritization rows */
.mrow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.mrow .mn{width:84px;flex:none;font-size:13px;font-weight:600}
.mrow .na{height:36px;width:42px;flex:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;
  background:rgb(var(--color-bg-input));border:1px solid rgb(var(--color-ink-line));color:rgb(var(--color-ink-mute))}
.mrow .na.on{background:rgb(var(--color-bg-elev));border-color:rgb(var(--color-ink-dim));color:rgb(var(--color-ink))}
.mrow .tiers{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.mrow .tb{height:36px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
  background:rgb(var(--color-bg-input));border:1px solid rgb(var(--color-ink-line));color:rgb(var(--color-ink-dim))}
.mrow .tb.maintain.on{background:rgb(var(--color-bg-elev));border-color:rgb(var(--color-ink-dim));color:rgb(var(--color-ink))}
.mrow .tb.grow.on{background:rgb(var(--color-info)/0.2);border-color:rgb(var(--color-info));color:rgb(var(--color-info))}
.mrow .tb.emphasize.on{background:rgb(var(--color-accent));border-color:rgb(var(--color-accent));color:#fff}
.mrow .tb:disabled{opacity:.3;pointer-events:none}
.emcount{font-size:12px;margin-bottom:12px}
/* week / rest day grids */
.weekrow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.wcell{display:flex;flex-direction:column;align-items:center;gap:4px}
.wcell .wn{font-size:10px;color:rgb(var(--color-ink-dim))}
.wcell .wb{height:34px;width:100%;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.wb.work{background:rgb(var(--color-accent)/0.15);border:1px solid rgb(var(--color-accent)/0.4);color:rgb(var(--color-accent-hot))}
.wb.rest{background-image:repeating-linear-gradient(45deg,rgb(var(--color-ink-line)/0.7),rgb(var(--color-ink-line)/0.7) 1px,transparent 1px,transparent 6px);border:1px solid rgb(var(--color-ink-line));color:rgb(var(--color-ink-mute))}
.restbtn{height:36px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;
  background:rgb(var(--color-bg-input));border:1px solid rgb(var(--color-ink-line));color:rgb(var(--color-ink-dim))}
.restbtn.rest{background-image:repeating-linear-gradient(45deg,rgb(var(--color-ink-line)/0.7),rgb(var(--color-ink-line)/0.7) 1px,transparent 1px,transparent 6px);border-color:rgb(var(--color-ink-dim));color:rgb(var(--color-ink))}
.restbtn.start{background:rgb(var(--color-accent)/0.15);border-color:rgb(var(--color-accent)/0.4);color:rgb(var(--color-accent-hot));opacity:.8;cursor:default}
/* split preview */
.weekgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.weekgrid .d{background:rgb(var(--color-bg-input));border-radius:7px;padding:6px 4px;text-align:center;font-size:10px;min-height:54px}
.weekgrid .d .dn{font-weight:700;color:rgb(var(--color-ink-dim));font-size:9px;text-transform:uppercase}
.weekgrid .d .dl{margin-top:4px;font-weight:600;font-size:10px;line-height:1.2}
.weekgrid .d.rest{background:transparent;border:1px dashed rgb(var(--color-ink-line));color:rgb(var(--color-ink-mute))}
.weekgrid .d.train{border:1px solid rgb(var(--color-accent-dim))}
/* stepper */
.stepper{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.stepper .sl{font-size:12px;color:rgb(var(--color-ink-dim))}
.stepbtn{width:34px;height:34px;border-radius:8px;border:1px solid rgb(var(--color-ink-line));background:rgb(var(--color-bg-input));color:rgb(var(--color-ink));font-size:18px;cursor:pointer}
.stepbtn:disabled{opacity:.3}
/* review */
.rev{background:rgb(var(--color-bg-card));border:1px solid rgb(var(--color-ink-line));border-radius:12px;padding:13px 15px;margin-bottom:10px}
.rev .rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.rev .rh b{font-size:14px}
.rev .edit{font-size:12px;color:rgb(var(--color-accent-hot));cursor:pointer;background:none;border:none;font-family:inherit}
.rev .rb{font-size:13px;color:rgb(var(--color-ink-dim));line-height:1.6}
.rev .rb .k{color:rgb(var(--color-ink))}
/* volume grid */
.volcard{background:rgb(var(--color-bg-card));border:1px solid rgb(var(--color-ink-line));border-radius:12px;padding:14px;margin:14px 0}
.volcard h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:rgb(var(--color-ink-dim));margin-bottom:4px}
.volgrid{display:grid;gap:3px 4px;align-items:center;margin-top:8px}
.volgrid .vh{font-size:10px;text-align:center;color:rgb(var(--color-ink-mute));text-transform:uppercase;letter-spacing:.04em}
.volgrid .vm{font-size:12px;font-weight:600}
.volgrid .vm.emphasize{color:rgb(var(--color-accent-hot))}
.volgrid .vm.grow{color:rgb(var(--color-info))}
.volgrid .vm.maintain{color:rgb(var(--color-ink-mute))}
.volgrid .vn{font-family:var(--font-mono);font-size:12px;text-align:center;color:rgb(var(--color-ink-dim))}
.volgrid .vn.dl{color:rgb(var(--color-ink-mute))}
.vleg{display:flex;gap:12px;font-size:11px;color:rgb(var(--color-ink-mute));margin-top:10px}
.vleg span{display:inline-flex;align-items:center;gap:5px}
.swatch{width:10px;height:10px;border-radius:3px}
/* p16 */
.day{border:1px solid rgb(var(--color-ink-line));border-radius:12px;margin-bottom:10px;overflow:hidden}
.day-h{padding:12px 15px;background:rgb(var(--color-bg-elev));display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px}
.day-h .em{font-size:11px;color:rgb(var(--color-ink-dim));font-weight:500}
.ex{display:flex;align-items:center;gap:10px;padding:11px 15px;border-top:1px solid rgb(var(--color-ink-line));font-size:13px}
.ex .num{color:rgb(var(--color-ink-mute));font-family:var(--font-mono);font-size:12px;width:18px}
.ex .nm{flex:1;font-weight:500}
.ex .pr{font-family:var(--font-mono);font-size:12px;color:rgb(var(--color-ink-dim))}
.ex .swap{font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid rgb(var(--color-ink-line));background:transparent;color:rgb(var(--color-ink));cursor:pointer;font-family:inherit}
.ex .swap:hover{border-color:rgb(var(--color-accent))}
.ex .exm{width:78px;flex:none;font-size:12px;font-weight:600;color:rgb(var(--color-ink-dim))}
.ex .exsel{flex:1;min-width:0;background:rgb(var(--color-bg-input));border:1px solid rgb(var(--color-ink-line));border-radius:8px;color:rgb(var(--color-ink));padding:8px 9px;font-size:13px;font-family:inherit}
.ex .exsel:focus{outline:none;border-color:rgb(var(--color-accent))}
.ex .exdel{width:32px;flex:none;border:1px solid rgb(var(--color-ink-line));background:transparent;color:rgb(var(--color-ink-mute));border-radius:7px;cursor:pointer;font-size:13px}
.ex .exdel:hover{border-color:rgb(var(--color-danger));color:rgb(var(--color-danger))}
.exadd{display:flex;gap:8px;align-items:center;padding:11px 15px;border-top:1px dashed rgb(var(--color-ink-line))}
.exadd select{flex:1;min-width:0;background:rgb(var(--color-bg-input));border:1px solid rgb(var(--color-ink-line));border-radius:8px;color:rgb(var(--color-ink));padding:8px 9px;font-size:13px;font-family:inherit}
.exadd button{flex:none;border:1px solid rgb(var(--color-accent)/0.6);background:rgb(var(--color-accent)/0.08);color:rgb(var(--color-accent-hot));border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.exadd button:hover{background:rgb(var(--color-accent)/0.16)}
.phasetabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.phasetabs button{padding:8px 12px;border-radius:8px;border:1px solid rgb(var(--color-ink-line));background:rgb(var(--color-bg-card));font-size:12px;cursor:pointer;color:rgb(var(--color-ink-dim));font-family:inherit}
.phasetabs button.on{background:rgb(var(--color-accent));color:#fff;border-color:rgb(var(--color-accent))}
/* drawer */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;display:none}
.scrim.open{display:block}
.drawer{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgb(var(--color-bg-card));
  border-top:1px solid rgb(var(--color-ink-line));border-radius:18px 18px 0 0;max-width:720px;margin:0 auto;
  padding:18px;transform:translateY(100%);transition:transform .28s ease;max-height:80vh;overflow:auto}
.drawer.open{transform:none}
.drawer h3{font-size:16px;margin-bottom:4px}
.alt{border:1px solid rgb(var(--color-ink-line));border-radius:10px;padding:12px;margin-top:9px;cursor:pointer}
.alt:hover{border-color:rgb(var(--color-accent))}
.alt .an{font-weight:600;font-size:14px}
.alt .ad{font-size:12px;color:rgb(var(--color-ink-dim));margin-top:2px}
/* footer */
.footer{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgb(var(--color-bg)/0.95);backdrop-filter:blur(8px);border-top:1px solid rgb(var(--color-ink-line))}
.footer .hint{font-size:11px;color:rgb(var(--color-ink-mute));text-align:center;padding:5px 4px 0;font-family:var(--font-mono);min-height:18px}
.footer .inner{max-width:720px;margin:0 auto;padding:8px 18px 14px;display:flex;gap:10px}
.btn{flex:1;min-height:48px;border-radius:11px;font-weight:600;font-size:15px;cursor:pointer;border:none;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s,background .12s}
.btn:active{transform:scale(.98)}
.btn-primary{background:rgb(var(--color-accent));color:#fff}
.btn-primary:hover{background:rgb(var(--color-accent-hot))}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:rgb(var(--color-ink));border:1px solid rgb(var(--color-ink-line));flex:0 0 auto;padding:0 20px}
.btn-generate{background:linear-gradient(135deg,rgb(var(--color-accent)),rgb(var(--color-accent-hot)));font-size:16px}
.btn-sm{min-height:40px;font-size:13px;border-radius:9px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-row"><div class="brand"><span class="dot"></span>FATRAT · Plan Wizard</div><div class="steplabel" id="steplabel">1 / 16</div></div>
    <div class="progress"><i id="progbar"></i></div>
  </div>
  <div class="page" id="page"></div>
  <div class="footer">
    <div class="hint" id="hint"></div>
    <div class="inner"><button class="btn btn-ghost" id="backBtn">Back</button><button class="btn btn-primary" id="nextBtn">Next</button></div>
  </div>
</div>
<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer"></div>

<script>
/* ---------------- STATE ---------------- */
const state = {
  name:'',
  goal:{primary:null,secondary:null},
  experience:{level:null,status:null},
  profile:{ageRange:'30',sex:'male',weightLbs:185,heightIn:'5ft 10',units:'lbs',injuries:[],stubbornAreas:[]},
  schedule:{daysPerWeek:null,sessionMinutes:null,startDow:1,restDays:[],durationWeeks:null},
  equipment:{environment:null,items:[]},
  trainingStyle:{baseStyle:null,volumeFramework:null,periodizationStrategy:null},
  split:{type:null},
  prioritization:{tiers:{}}, // muscle -> 'maintain'|'grow'|'emphasize' ; absent = N/A
  setsAndReps:{repRange:null,setTypes:[],autoVary:false},
  restAndTempo:{restPreference:null,tempoEnabled:false,tempoStyle:null},
  core:{method:null,frequency:null,blockExercises:'2-3',days:[]},
  cardio:{included:null,type:[],frequency:null,placement:null,durationMinutes:null},
  progression:{type:null,deloadProtocol:null,deloadFrequency:null,deloadStyle:null},
  baselines:{methods:{},calibrationWeek:false,allConservative:false},
  programByPhase:{},
  generated:false
};
let cur=0, seen=false, curPhase=0;
const seenPages=new Set();  // pages whose full content has been seen at least once
const TOTAL=16;
const DOW_ABBR=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOW_FULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_OFFSETS={1:[0],2:[0,3],3:[0,2,4],4:[0,1,3,4],5:[0,1,2,4,5],6:[0,1,2,3,4,5],7:[0,1,2,3,4,5,6]};

/* ---------------- helpers ---------------- */
const $=s=>document.querySelector(s);
function getPath(p){return p.split('.').reduce((o,k)=>o&&o[k],state);}
function setPath(p,v){const ks=p.split('.');let o=state;for(let i=0;i<ks.length-1;i++)o=o[ks[i]];o[ks[ks.length-1]]=v;}
function toggleArr(p,v){const a=getPath(p)||[];const i=a.indexOf(v);i>=0?a.splice(i,1):a.push(v);setPath(p,a);}
function effLevel(){let l=state.experience.level;if(state.experience.status==='layoff12'&&l){const o=['beginner','novice','intermediate','advanced'];const i=o.indexOf(l);if(i>0)return o[i-1];}return l;}
function levelRank(l){return ({beginner:0,novice:1,intermediate:2,advanced:3})[l] ?? 0;}
function isBeginnerScratch(){return state.experience.level==='beginner'&&state.experience.status==='scratch';}
function isBlock(){return state.trainingStyle.periodizationStrategy==='block';}
function isVolumeRamped(){return state.trainingStyle.volumeFramework==='evidence'||state.trainingStyle.periodizationStrategy==='block';}
function durWeeks(){return state.schedule.durationWeeks==='ongoing'?8:(state.schedule.durationWeeks||8);}
function bw(){return state.profile.units==='kg'?Math.round(state.profile.weightLbs/2.205):state.profile.weightLbs;}
function note(type,txt,icon){const ic={info:'ℹ',warn:'⚠',ok:'✓'}[type];return `<div class="note ${type}"><span class="ic">${icon||ic}</span><span>${txt}</span></div>`;}
function defaultRestDays(startDow,d){const work=new Set(DAY_OFFSETS[d]||[]);const rest=[];for(let off=0;off<7;off++)if(!work.has(off))rest.push((startDow+off)%7);return rest;}
function nextDowStr(dow){const d=new Date();d.setDate(d.getDate()+((dow-d.getDay()+7)%7));return d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});}

function singleCard(field,opts,o){o=o||{};return `<div class="grid ${o.two?'two':''}">`+opts.map(op=>{
  const sel=getPath(field)===op.id;const dis=op.disabled?'disabled':'';
  return `<button class="choice ${sel?'sel':''} ${dis}" data-single="${field}" data-val="${op.id}">

  quads:{mev:8,mav:16,mrv:20},hamstrings:{mev:6,mav:14,mrv:20},glutes:{mev:0,mav:12,mrv:16},calves:{mev:6,mav:12,mrv:18},core:{mev:0,mav:12,mrv:20}};

/* --- exercise-slot model, mirrors lib/program/templateLayout.ts --- */
const DEFAULT_EMPHASIS_SLOTS=2;   // emphasis muscle gets 2 exercises per training day (overridable 1-3 in real app)
const DEFAULT_SETS=3;             // default sets per exercise
function slotsPerDayFor(tier){return tier==='emphasize'?DEFAULT_EMPHASIS_SLOTS:1;}  // grow/maintain = 1 exercise/day
/* Sets per exercise for week w. Traditional = flat default (3). Periodized ramps 2->4, deload last week. */
function setsThisWeek(w,weeks,per){if(!per)return DEFAULT_SETS;if(weeks>1&&w===weeks-1)return 2;const working=Math.max(1,weeks-1);const t=working>1?w/(working-1):0;return Math.round(2+2*t);}
function volumeRamp(tier,weeks,lm,periodized){
  const maintain=Math.max(1,Math.round(lm.mev*0.5));
  if(!periodized){const steady=tier==='emphasize'?lm.mav:tier==='grow'?Math.round((lm.mev+lm.mav)/2):maintain;return Array.from({length:weeks},()=>Math.max(1,steady));}
  const out=[];const working=Math.max(1,weeks-1);
  for(let w=0;w<weeks;w++){if(w===weeks-1&&weeks>1){out.push(maintain);continue;}
    const t=working>1?w/(working-1):0;let start=lm.mev,end=lm.mev;
    if(tier==='emphasize')end=lm.mrv;else if(tier==='grow')end=lm.mav;else{start=maintain;end=maintain;}
    out.push(Math.max(1,Math.round(start+(end-start)*t)));}
  return out;
}

  if(g==='strength')return ['chest','back','quads'].includes(m)?'emphasize':['biceps','forearms','calves'].includes(m)?'maintain':'grow';

  if(g==='transform')return ['chest','back','quads'].includes(m)?'emphasize':'grow';
  // muscle, leanout, fitness -> all Grow
  return 'grow';
}

  const days=buildProgram(targets);const cm=state.core.method;const cp=corePool();const n=coreExCount();
  if(cm==='block'||cm==='superset')days.forEach(d=>{for(let i=0;i<n&&i<cp.length;i++)d.exercises.push({muscle:'Core',name:cp[i],presc:cm==='superset'?'3×12':'3×15',anchor:false});});
  else if(cm==='day'&&days[0])for(let i=0;i<n&&i<cp.length;i++)days[0].exercises.push({muscle:'Core',name:cp[i],presc:'3×15',anchor:false});
  return days;
}
pages.push({title:'Exercises',render(){
  if(!state.generated)return `<div class="eyebrow">Step 16</div><h1 class="pt">Generate to review exercises</h1><div class="sub">Hit "Generate My Program" on the Review page first.</div>${note('info','This page lists every exercise grouped by day, built from your split & equipment, with swap options. Anchors 🔒 reset progression when swapped.')}`;
  const struct=weekStructure();const lc=struct.loadCount;const block=isBlock();
  const loads=struct.filter(w=>w.kind==='load');
  const phase=block?curPhase:0;
  let wkObj=block?(loads[[0,Math.floor((loads.length-1)/2),loads.length-1][phase]]||loads[0]):(loads[0]||struct[0]);
  if(!state.programByPhase[phase])state.programByPhase[phase]=genDays(wkObj,lc);
  const days=state.programByPhase[phase];
  let h=`<div class="eyebrow">Step 16</div><h1 class="pt">Your program</h1><div class="sub">Built from your ${(allowedSplits().find(s=>s.id===state.split.type)||{}).label||'split'} using only your equipment. Pick a different movement from any dropdown, or add/remove exercises. Core is listed like any other muscle group. Each exercise targets ~${DEFAULT_SETS} sets.</div>`;
  if(block){const phases=['Phase 1: Hypertrophy','Phase 2: Strength','Phase 3: Peak'];
    h+=`<div class="phasetabs">`+phases.map((p,i)=>`<button class="${i===curPhase?'on':''}" data-phase="${i}">${p}</button>`).join('')+`</div>`;}
  days.forEach((d,di)=>{const daySets=d.exercises.reduce((a,e)=>a+parseInt(e.presc),0);
    h+=`<div class="day"><div class="day-h">${DOW_FULL[d.dow]} — ${d.type} <span class="em">${d.emphasis?d.emphasis+' · ':''}${daySets} sets</span></div>`;
    d.exercises.forEach((e,ei)=>{
      let opts=e.muscle==='Core'?corePool():poolFor(e.muscle).map(x=>x[0]);
      if(!opts.includes(e.name))opts=[e.name].concat(opts);
      h+=`<div class="ex"><span class="exm">${cap(e.muscle)}${e.anchor?' 🔒':''}</span>`+
        `<select class="exsel" data-exsel="${phase}:${di}:${ei}">`+opts.map(o=>`<option ${o===e.name?'selected':''}>${o}</option>`).join('')+`</select>`+
        `<span class="pr">${e.presc}</span><button class="exdel" data-exdel="${phase}:${di}:${ei}" title="Remove">✕</button></div>`;});
    const addMuscles=(DAY_MUSCLES[d.type]||[]).filter(m=>state.prioritization.tiers[m]!=null);
    if(['block','superset','day'].includes(state.core.method))addMuscles.push('Core');
    h+=`<div class="exadd"><select data-addmuscle="${phase}:${di}">`+addMuscles.map(m=>`<option value="${m}">${cap(m)}</option>`).join('')+`</select><button data-exadd="${phase}:${di}">+ Add exercise</button></div>`;
    h+=`</div>`;});
  return h;
},valid(){return true;}});

/* ---------------- DRAWER ---------------- */
const SWAP_ALTS={
  'Incline DB Press':[['Incline Barbell Press','Chest','Barbell','Heavier loading, same angle'],['Machine Chest Press','Chest','Machine','Fixed path, easier on shoulders']],
  'Cable Fly':[['Pec Deck','Chest','Pec Deck','Same isolation, more stable'],['DB Fly','Chest','Dumbbells','No cables needed']],
  'DB Lateral Raise':[['Cable Lateral Raise','Side Delts','Cable','Constant tension'],['Machine Lateral Raise','Side Delts','Machine','Strict, fixed path']],
  'Barbell Bench Press':[['Dumbbell Bench Press','Chest','Dumbbells','Bigger stretch, less shoulder stress'],['Floor Press','Chest','Barbell','Shorter ROM, shoulder-friendly']],
  'Barbell Back Squat':[['Front Squat','Quads','Barbell','More upright, quad-biased'],['Hack Squat','Quads','Machine','Fixed path, quad focus']],
  'Barbell Row':[['Chest-Supported Row','Back','Machine/Bench','Removes lower-back strain'],['One-Arm DB Row','Back','Dumbbells','Unilateral, big stretch']],
};
function openSwap(name,anchor){
  const alts=SWAP_ALTS[name]||[['Alternative A','Same muscle','Your equipment','Matched by muscle, equipment & pattern'],['Alternative B','Same muscle','Your equipment','Matched by muscle, equipment & pattern']];
  let h=`<h3>Swap: ${name}</h3><div class="sub" style="margin-bottom:8px">Filtered by muscle group, your equipment & movement pattern.</div>`;
  if(anchor)h+=note('warn','This is a primary lift your progression is built around. Swapping resets loading for this movement pattern.');
  h+=alts.map(a=>`<div class="alt" data-pick="1"><div class="an">${a[0]}</div><div class="ad">${a[1]} · ${a[2]} — ${a[3]}</div></div>`).join('');
  h+=`<button class="btn btn-ghost" style="width:100%;margin-top:14px" data-closedrawer="1">Cancel</button>`;
  $('#drawer').innerHTML=h;$('#drawer').classList.add('open');$('#scrim').classList.add('open');}
function closeDrawer(){$('#drawer').classList.remove('open');$('#scrim').classList.remove('open');}

/* ---------------- RENDER & NAV ---------------- */
function render(scroll){
  const p=pages[cur];if(p.onEnter)p.onEnter();
  const y=window.scrollY;
  $('#page').innerHTML=p.render();
  $('#steplabel').textContent=(cur+1)+' / '+TOTAL;
  $('#progbar').style.width=((cur+1)/TOTAL*100)+'%';
  $('#backBtn').style.visibility=cur===0?'hidden':'visible';
  if(scroll){window.scrollTo(0,0);}else{window.scrollTo(0,y);}
  evalSeen();
}
function markSeen(){seen=true;seenPages.add(cur);updateNav();}
function evalSeen(){
  const fits=document.body.scrollHeight<=window.innerHeight+8;
  if(fits||seenPages.has(cur))markSeen();else updateNav();
}
function updateNav(){
  const p=pages[cur];const valid=p.valid?p.valid():true;const nb=$('#nextBtn');
  if(cur===14){nb.textContent='⚡ Generate My Program';nb.className='btn btn-primary btn-generate';}
  else if(cur===15){nb.textContent='Start My Program';nb.className='btn btn-primary';}
  else{nb.textContent='Next';nb.className='btn btn-primary';}
  nb.disabled=!(valid&&seen);
  $('#hint').textContent = !seen ? 'Scroll down to see the whole page ↓' : (!valid ? 'Make a selection to continue' : '');
}
function sectionAnchors(){const p=$('#page');return Array.prototype.filter.call(p.children,c=>c.classList&&(c.classList.contains('section-head')||c.classList.contains('field')));}
function nextSectionIdx(el){const ct=el.getBoundingClientRect().top+window.scrollY;let idx=0;sectionAnchors().forEach(a=>{if(a.getBoundingClientRect().top+window.scrollY<=ct+1)idx++;});return idx;}
function scrollToSection(idx){const secs=sectionAnchors();const el=secs[idx];if(!el)return;const top=el.getBoundingClientRect().top+window.scrollY-90;window.scrollTo({top:Math.max(0,top),behavior:'smooth'});}
function navTo(i){cur=i;seen=seenPages.has(i);render(true);}
function next(){if(!seen)return;if(cur===14){state.generated=true;state.programByPhase={};navTo(15);return;}if(cur<TOTAL-1){navTo(cur+1);}else{alert('🎉 Program started! (mockup end)');}}
function back(){if(cur>0)navTo(cur-1);}

/* ---------------- EVENTS ---------------- */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-single],[data-multi],[data-toggle],[data-eq],[data-eqall],[data-tier],[data-rest],[data-coreday],[data-baseline],[data-allcons],[data-calib],[data-goto],[data-phase],[data-swap],[data-exadd],[data-exdel],[data-pick],[data-closedrawer],[data-noop]');
  if(!t)return;
  if(t.dataset.noop!==undefined)return;
  if(t.dataset.single!==undefined){const _ni=nextSectionIdx(t);let v=t.dataset.val;if(v!=='ongoing'&&!isNaN(+v)&&v!=='')v=+v;setPath(t.dataset.single,v);
    if(t.dataset.single==='schedule.daysPerWeek'){state.schedule.restDays=defaultRestDays(state.schedule.startDow,v);state.split.type=null;}
    if(t.dataset.single==='schedule.startDow'){state.schedule.restDays=defaultRestDays(v,state.schedule.daysPerWeek);}
    if(t.dataset.single==='trainingStyle.baseStyle'){state.trainingStyle.volumeFramework=null;state.trainingStyle.periodizationStrategy=null;}
    render(false);scrollToSection(_ni);}
  else if(t.dataset.multi!==undefined){let v=t.dataset.val;if(!isNaN(+v))v=+v;toggleArr(t.dataset.multi,v);render(false);}
  else if(t.dataset.toggle!==undefined){setPath(t.dataset.toggle,!getPath(t.dataset.toggle));render(false);}
  else if(t.dataset.eq!==undefined){toggleArr('equipment.items',t.dataset.eq);render(false);}
  else if(t.dataset.eqall!==undefined){const all=allEquip();state.equipment.items=all.every(i=>state.equipment.items.includes(i))?[]:all.slice();render(false);}
  else if(t.dataset.tier!==undefined){const m=t.dataset.tier,v=t.dataset.val;state.prioritization.tiers[m]=(v==='na'?null:v);if(v==='na')delete state.prioritization.tiers[m];render(false);}
  else if(t.dataset.rest!==undefined){toggleRest(+t.dataset.rest);render(false);}
  else if(t.dataset.coreday!==undefined){toggleArr('core.days',+t.dataset.coreday);render(false);}
  else if(t.dataset.baseline){if(t.disabled)return;state.baselines.methods[t.dataset.baseline]=t.dataset.val;render(false);}
  else if(t.dataset.allcons!==undefined){state.baselines.allConservative=!state.baselines.allConservative;
    if(state.baselines.allConservative){state.baselines.calibrationWeek=false;(programLifts()||[]).forEach(l=>state.baselines.methods[l]='conservative');}render(false);}
  else if(t.dataset.calib!==undefined){state.baselines.calibrationWeek=!state.baselines.calibrationWeek;if(state.baselines.calibrationWeek)state.baselines.allConservative=false;render(false);}
  else if(t.dataset.goto!==undefined){navTo(+t.dataset.goto);}
  else if(t.dataset.phase!==undefined){curPhase=+t.dataset.phase;render(false);}
  else if(t.dataset.exadd!==undefined){const a=t.dataset.exadd.split(':').map(Number);const sel=document.querySelector(`[data-addmuscle="${a[0]}:${a[1]}"]`);const m=sel?sel.value:null;if(!m)return;
    let name=m==='Core'?corePool()[0]:((poolFor(m)[0]||[])[0]);if(!name)return;
    state.programByPhase[a[0]][a[1]].exercises.push({muscle:m,name,presc:'3×'+repsFor(false),anchor:false});render(false);}
  else if(t.dataset.exdel!==undefined){const a=t.dataset.exdel.split(':').map(Number);state.programByPhase[a[0]][a[1]].exercises.splice(a[2],1);render(false);}
  else if(t.dataset.swap!==undefined){openSwap(t.dataset.swap,t.dataset.anchor==='1');}
  else if(t.dataset.pick!==undefined){closeDrawer();}
  else if(t.dataset.closedrawer!==undefined){closeDrawer();}
});
function toggleRest(dow){const d=state.schedule.daysPerWeek;const maxRest=7-d;let r=state.schedule.restDays.slice();
  if(dow===state.schedule.startDow)return;
  if(r.includes(dow)){r=r.filter(x=>x!==dow);}
  else{r.push(dow);while(r.length>maxRest)r.shift();}
  state.schedule.restDays=r;}
document.addEventListener('change',e=>{const t=e.target;if(t&&t.dataset&&t.dataset.exsel!==undefined){const a=t.dataset.exsel.split(':').map(Number);const d=state.programByPhase[a[0]];if(d&&d[a[1]]&&d[a[1]].exercises[a[2]])d[a[1]].exercises[a[2]].name=t.value;}});
document.addEventListener('input',e=>{
  if(e.target.id==='nameInput')state.name=e.target.value;
  if(e.target.id==='bwInput'){const v=parseFloat(e.target.value)||0;state.profile.weightLbs=state.profile.units==='kg'?Math.round(v*2.205):v;}
});
window.addEventListener('scroll',()=>{if(window.innerHeight+window.scrollY>=document.body.scrollHeight-10){if(!seen)markSeen();}},{passive:true});
window.addEventListener('resize',evalSeen);
$('#nextBtn').onclick=next;$('#backBtn').onclick=back;$('#scrim').onclick=closeDrawer;
navTo(0);
</script>
</body>
